name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test-and-package:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run frontend lint/typecheck
        run: npm run lint

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Build frontend bundle header
        run: npm run build:frontend

      - name: Configure CMake
        run: cmake -S . -B build -DSHIBUI_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build native app
        run: cmake --build build --config Release

      - name: Run native tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Run Python tests
        run: python -m pip install pytest && pytest -q

      - name: Build packages
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: shibui-code-macos
          path: |
            *.tgz
            *.tar.gz
            *.dmg
