name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test-and-package:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Configure CMake (ci preset)
        run: cmake --preset ci

      - name: Build (ci preset)
        run: cmake --build --preset ci

      - name: Run unified tests (CTest)
        env:
          SHIBUI_REQUIRE_E2E: "1"
        run: ctest --preset ci --output-on-failure

      - name: Build packages
        run: cpack --config build/ci/CPackConfig.cmake

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: shibui-code-macos
          path: |
            build/ci/*.tgz
            build/ci/*.tar.gz
            build/ci/*.dmg
