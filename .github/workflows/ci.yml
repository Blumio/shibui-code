name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  test-and-package:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux GTK dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install frontend dependencies
        run: npm --prefix frontend install

      - name: Run frontend tests
        run: npm --prefix frontend run test

      - name: Build frontend bundle header
        run: npm run build:frontend

      - name: Configure CMake
        run: cmake -S . -B build -DSHIBUI_BUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build native app
        run: cmake --build build --config Release

      - name: Run native tests
        run: ctest --test-dir build --output-on-failure -C Release

      - name: Run Python tests
        run: python -m pip install pytest && pytest -q

      - name: Build packages
        run: cpack --config build/CPackConfig.cmake -C Release

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: shibui-code-${{ runner.os }}
          path: |
            *.zip
            *.tgz
            *.dmg
            *.exe
            *.deb
